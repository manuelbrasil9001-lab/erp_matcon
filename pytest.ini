[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --cov=backend
    --cov-report=term-missing
    --cov-report=html:/tmp/erp_coverage_html
    --cov-fail-under=80
    -p no:warnings
log_cli = false
markers =
    unitario: Testes unitários (sem banco de dados)
    integracao: Testes de integração (com banco real)
    fiscal: Testes do fluxo fiscal (NFC-e / NF-e / NFS-e)
    estoque: Testes de controle de estoque
    bling: Testes de integração com a API Bling
